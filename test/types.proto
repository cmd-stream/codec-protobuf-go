syntax = "proto3";
package protobuf;

option go_package = "github.com/cmd-stream/codec-protobuf-go/test";

// protoc --go_out=. --go_opt=paths=source_relative ./test/types.proto

message Cmd1 {
  int64 X = 1;
}

message Cmd2 {
  string Y = 1;
}

message Result1 {
  int64 X = 1;
}

message Result2 {
  string Y = 1;
}
